name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  jest:
    name: Testy Jest
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci

      - name: Uruchom testy Jest
        run: npm test

  playwright:
    name: Testy Playwright
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci

      - name: Zainstaluj przeglądarki Playwright
        run: npx playwright install --with-deps chromium

      - name: Zbuduj aplikację
        run: npm run build
        env:
          AUTH_SECRET: test-secret-for-ci
          GITHUB_CLIENT_ID: placeholder
          GITHUB_CLIENT_SECRET: placeholder

      - name: Uruchom testy Playwright
        run: npx playwright test --project=chromium
        env:
          AUTH_SECRET: test-secret-for-ci
          GITHUB_CLIENT_ID: placeholder
          GITHUB_CLIENT_SECRET: placeholder

      - name: Zapisz raport z testów
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
